version: 2

models:
  - name: stg_customers
    description: "Clean customer data"

    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: customer_name
        tests:
          - not_null

  - name: stg_products
    description: "Clean product data"

    columns:
      - name: product_id
        tests:
          - unique
          - not_null

      - name: price
        tests:
          - not_null

  - name: stg_orders
    description: "Clean orders data"

    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
